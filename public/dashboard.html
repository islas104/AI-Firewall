<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AI Firewall — Budget Control</title>
<style>
  :root {
    --bg: oklch(16% 0.012 260);
    --surface: oklch(21% 0.014 260);
    --surface-raised: oklch(25% 0.016 260);
    --line: oklch(32% 0.02 260);
    --text: oklch(92% 0.005 260);
    --text-dim: oklch(64% 0.01 260);
    --text-faint: oklch(48% 0.01 260);
    --ok: oklch(78% 0.17 155);
    --warn: oklch(80% 0.16 85);
    --danger: oklch(66% 0.24 25);
    --accent: oklch(75% 0.14 230);
    --mono: "SF Mono", "JetBrains Mono", ui-monospace, Menlo, monospace;
    --sans: -apple-system, "Inter", system-ui, sans-serif;
    --radius: 10px;
    --duration: 300ms;
    --ease: cubic-bezier(0.16, 1, 0.3, 1);
  }
  * { box-sizing: border-box; margin: 0; }
  body {
    background:
      radial-gradient(1200px 500px at 70% -10%, oklch(24% 0.03 250 / 0.6), transparent),
      var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    padding: clamp(1rem, 3vw, 2.5rem);
  }
  header {
    display: flex; align-items: baseline; gap: 1rem; flex-wrap: wrap;
    margin-bottom: 2rem;
  }
  h1 { font-size: clamp(1.3rem, 2.5vw, 1.7rem); font-weight: 650; letter-spacing: -0.02em; }
  h1 .badge {
    font-family: var(--mono); font-size: 0.6em; font-weight: 500;
    color: var(--accent); border: 1px solid color-mix(in oklch, var(--accent), transparent 60%);
    padding: 0.2em 0.6em; border-radius: 99px; vertical-align: middle; margin-left: 0.6em;
  }
  #meta { margin-left: auto; font-family: var(--mono); font-size: 0.78rem; color: var(--text-faint); }
  #meta .live { color: var(--ok); animation: pulse 2s infinite; }
  @keyframes pulse { 50% { opacity: 0.35; } }

  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 0.9rem; margin-bottom: 2rem; }
  .stat {
    background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius);
    padding: 1rem 1.2rem;
  }
  .stat .label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.09em; color: var(--text-faint); margin-bottom: 0.45rem; }
  .stat .value { font-family: var(--mono); font-size: 1.7rem; font-weight: 600; letter-spacing: -0.01em; }
  .stat .value.ok { color: var(--ok); } .stat .value.danger { color: var(--danger); }

  .panel {
    background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius);
    overflow: hidden;
  }
  .panel-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0.9rem 1.2rem; border-bottom: 1px solid var(--line);
  }
  .panel-head h2 { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.09em; color: var(--text-dim); font-weight: 600; }

  table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
  th {
    text-align: left; font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--text-faint); font-weight: 600; padding: 0.7rem 1.2rem; border-bottom: 1px solid var(--line);
  }
  td { padding: 0.85rem 1.2rem; border-bottom: 1px solid color-mix(in oklch, var(--line), transparent 45%); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr { transition: background var(--duration) var(--ease); }
  tbody tr:hover { background: var(--surface-raised); }
  .agent-id { font-family: var(--mono); font-weight: 600; }
  .num { font-family: var(--mono); font-variant-numeric: tabular-nums; }
  .dim { color: var(--text-dim); }

  .bar { position: relative; height: 6px; border-radius: 3px; background: var(--surface-raised); min-width: 140px; overflow: hidden; }
  .bar > i {
    position: absolute; inset: 0 auto 0 0; border-radius: 3px;
    transform-origin: left; transition: transform 600ms var(--ease), background var(--duration);
    width: 100%; display: block; background: var(--ok);
  }
  .pill {
    font-family: var(--mono); font-size: 0.68rem; font-weight: 600; padding: 0.25em 0.7em;
    border-radius: 99px; letter-spacing: 0.04em;
  }
  .pill.ok     { color: var(--ok);     background: color-mix(in oklch, var(--ok), transparent 88%); }
  .pill.warn   { color: var(--warn);   background: color-mix(in oklch, var(--warn), transparent 86%); }
  .pill.halted { color: var(--danger); background: color-mix(in oklch, var(--danger), transparent 84%); }

  button {
    font: inherit; font-size: 0.72rem; font-family: var(--mono); cursor: pointer;
    color: var(--text-dim); background: transparent; border: 1px solid var(--line);
    border-radius: 6px; padding: 0.3em 0.75em; transition: all var(--duration) var(--ease);
  }
  button:hover { color: var(--text); border-color: var(--text-faint); background: var(--surface-raised); }
  button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  button.danger:hover { color: var(--danger); border-color: var(--danger); }

  .empty { padding: 3rem 1.2rem; text-align: center; color: var(--text-faint); font-size: 0.9rem; }
  .empty code { font-family: var(--mono); color: var(--text-dim); background: var(--surface-raised); padding: 0.15em 0.5em; border-radius: 5px; }
  #error { display: none; margin-bottom: 1rem; padding: 0.8rem 1.2rem; border-radius: var(--radius);
    background: color-mix(in oklch, var(--danger), transparent 85%); color: var(--danger);
    font-family: var(--mono); font-size: 0.8rem; border: 1px solid color-mix(in oklch, var(--danger), transparent 60%); }
  @media (prefers-reduced-motion: reduce) { * { animation: none !important; transition: none !important; } }
</style>
</head>
<body>
  <header>
    <h1>AI Firewall <span class="badge" id="upstream">—</span></h1>
    <div id="meta"><span class="live">●</span> <span id="day">—</span> · refresh 2s</div>
  </header>

  <div id="error"></div>

  <div class="stats">
    <div class="stat"><div class="label">Agents today</div><div class="value" id="stat-agents">—</div></div>
    <div class="stat"><div class="label">Total spend</div><div class="value" id="stat-spend">—</div></div>
    <div class="stat"><div class="label">Global daily limit</div><div class="value" id="stat-limit">—</div></div>
    <div class="stat"><div class="label">Halted agents</div><div class="value" id="stat-halted">—</div></div>
  </div>

  <div class="panel">
    <div class="panel-head"><h2>Agent fleet</h2></div>
    <table aria-label="Agent budget table">
      <thead>
        <tr>
          <th>Agent</th><th>Status</th><th>Spent</th><th style="width:30%">Budget used</th>
          <th>Limit</th><th>In-flight</th><th>Actions</th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
    <div class="empty" id="empty" hidden>
      No agents seen today. Send a request through the proxy:<br /><br />
      <code>curl -X POST localhost:3000/v1/chat/completions -H "X-Agent-ID: my-agent" …</code>
    </div>
  </div>

<script>
  const usd = (n) => '$' + Number(n).toFixed(4);
  const adminKey = () => localStorage.getItem('adminKey') || '';
  const headers = () => (adminKey() ? { 'X-Admin-Key': adminKey() } : {});

  async function api(path, opts = {}) {
    const res = await fetch(path, { ...opts, headers: { 'Content-Type': 'application/json', ...headers(), ...(opts.headers || {}) } });
    if (res.status === 401) {
      const key = prompt('Admin key required (X-Admin-Key):');
      if (key) { localStorage.setItem('adminKey', key); return api(path, opts); }
      throw new Error('unauthorized');
    }
    if (!res.ok) throw new Error('HTTP ' + res.status);
    return res.json();
  }

  function statusOf(a) {
    if (a.exceeded) return ['HALTED', 'halted'];
    if (a.spentUsd / a.limitUsd > 0.8) return ['NEAR LIMIT', 'warn'];
    return ['ACTIVE', 'ok'];
  }

  function render(data) {
    document.getElementById('upstream').textContent = data.upstream.toUpperCase();
    document.getElementById('day').textContent = data.day + ' UTC';
    const agents = data.agents;
    const total = agents.reduce((s, a) => s + a.spentUsd, 0);
    const halted = agents.filter((a) => a.exceeded).length;
    document.getElementById('stat-agents').textContent = agents.length;
    document.getElementById('stat-spend').textContent = usd(total);
    document.getElementById('stat-limit').textContent = usd(data.globalLimitUsd);
    const haltedEl = document.getElementById('stat-halted');
    haltedEl.textContent = halted;
    haltedEl.className = 'value ' + (halted ? 'danger' : 'ok');

    document.getElementById('empty').hidden = agents.length > 0;
    const rows = agents.map((a) => {
      const frac = Math.min(1, a.limitUsd ? a.spentUsd / a.limitUsd : 1);
      const [label, cls] = statusOf(a);
      const barColor = cls === 'halted' ? 'var(--danger)' : cls === 'warn' ? 'var(--warn)' : 'var(--ok)';
      return `<tr>
        <td class="agent-id">${esc(a.agentId)}</td>
        <td><span class="pill ${cls}">${label}</span></td>
        <td class="num">${usd(a.spentUsd)}</td>
        <td><div class="bar"><i style="transform:scaleX(${frac});background:${barColor}"></i></div></td>
        <td class="num dim">${usd(a.limitUsd)}${a.customLimit ? ' *' : ''}</td>
        <td class="num dim">${a.pendingUsd ? usd(a.pendingUsd) : '—'}</td>
        <td>
          <button onclick="setLimit('${esc(a.agentId)}')">limit</button>
          <button class="danger" onclick="resetSpend('${esc(a.agentId)}')">reset</button>
        </td>
      </tr>`;
    });
    document.getElementById('rows').innerHTML = rows.join('');
  }

  function esc(s) { return String(s).replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])); }

  async function setLimit(id) {
    const v = prompt(`New daily limit (USD) for ${id} — empty to clear override:`);
    if (v === null) return;
    await api(`/admin/agents/${encodeURIComponent(id)}/limit`, {
      method: 'PUT',
      body: JSON.stringify({ limitUsd: v.trim() === '' ? null : Number(v) }),
    });
    tick();
  }

  async function resetSpend(id) {
    if (!confirm(`Reset today's spend for ${id}? This un-trips the kill-switch.`)) return;
    await api(`/admin/agents/${encodeURIComponent(id)}/spend`, { method: 'DELETE' });
    tick();
  }

  async function tick() {
    const err = document.getElementById('error');
    try {
      render(await api('/admin/agents'));
      err.style.display = 'none';
    } catch (e) {
      err.textContent = 'Failed to reach proxy: ' + e.message;
      err.style.display = 'block';
    }
  }

  tick();
  setInterval(tick, 2000);
</script>
</body>
</html>
